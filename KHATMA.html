<style>

.available .juz-badge{background:var(--g5);color:var(--g1);border:2px solid var(--g4)}

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const JUZ_NAMES  = ["الم","سَيقول","تِلكَ الرُّسُل","لَن تَنالُوا","والمُحصَنات","لا يُحِبُّ الله","وإذا سَمِعوا","وَلَو أنَّنا","قالَ المَلأ","واعلَموا","يَعتَذِرونَ","وَما مِن دابَّة","وَما أُبَرِّئ","رُبَما","سُبحانَ الَّذي","قالَ ألَم","اقتَرَبَ","قَد أفلَحَ","وقالَ الَّذينَ","أمَّن خَلَقَ","اتلُ ما أوحِيَ","وَمَن يَقنُت","وما لِيَ","فَمَن أَظلَم","إليهِ يُرَدُّ","حم","قالَ فَما خَطبُكم","قَد سَمِعَ اللَّه","تَبارَكَ الَّذي","عَمَّ يَتَساءَلون"];

const ORDINALS   = ["الأولى","الثانية","الثالثة","الرابعة","الخامسة","السادسة","السابعة","الثامنة","التاسعة","العاشرة","الحادية عشرة","الثانية عشرة","الثالثة عشرة","الرابعة عشرة","الخامسة عشرة"];

const makeJuz    = i  => ({number:i+1,name:JUZ_NAMES[i],status:"available",reservedBy:null,reservedAt:null,completedAt:null});
const makeKhatma = idx => ({id:`k_${Date.now()}_${Math.random().toString(36).slice(2)}`,name:`الختمة ${ORDINALS[idx]??`رقم ${idx+1}`}`,createdAt:new Date().toISOString(),juzList:Array.from({length:30},(_,i)=>makeJuz(i))});
const toArr      = v  => Array.isArray(v)?v:Object.values(v||{});
const norm       = raw => raw?toArr(raw).filter(Boolean).map(k=>({...k,juzList:toArr(k.juzList)})):null;
const getStats   = k  => {if(!k)return{av:0,rs:0,cp:0};const l=toArr(k.juzList);return{av:l.filter(j=>j.status==="available").length,rs:l.filter(j=>j.status==="reserved").length,cp:l.filter(j=>j.status==="completed").length};};
const fmtDate    = iso => {try{return new Date(iso).toLocaleDateString("ar-EG",{year:"numeric",month:"long",day:"numeric"});}catch{return "";}};

let _db = null;
const db = () => {
  if (_db) return _db;
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  _db = firebase.database();
  return _db;
};

function App() {
  const [loading,setLoading]       = useState(true);
  const [khatmat,setKhatmat]       = useState([]);
  const [activeId,setActiveId]     = useState(null);
  const [userName,setUserName]     = useState("");
  const [search,setSearch]         = useState("");
  const [selJuz,setSelJuz]         = useState(null);
  const [modal,setModal]           = useState(null);
  const [toast,setToast]           = useState(null);
  const [adminOpen,setAdminOpen]   = useState(false);
  const [delConfirm,setDelConfirm] = useState(null);

  const showToast = useCallback((msg,type="success")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3500); },[]);

  useEffect(()=>{
    const name = localStorage.getItem("khatma_username");
    if(name) setUserName(name);

    const ref = db().ref("khatmat");
    const handler = async snap => {
      const raw = snap.val();
      if(!raw){
        const init=[makeKhatma(0)];
        await ref.set(init);
        setKhatmat(init); setActiveId(init[0].id); setLoading(false); return;
      }
      let arr = norm(raw);
      // remove premature empty khatmat
      let changed=false;
      arr=arr.filter((k,i)=>{
        if(i===0)return true;
        const prevAvail=arr[i-1].juzList.some(j=>j.status==="available");
        const empty=k.juzList.every(j=>j.status==="available");
        if(empty&&prevAvail){changed=true;return false;}
        return true;
      });
      if(changed){await ref.set(arr);return;}
      setKhatmat(arr);
      setActiveId(id=>id&&arr.find(k=>k.id===id)?id:arr[arr.length-1].id);
      setLoading(false);
    };
    ref.on("value",handler);
    return ()=>ref.off("value",handler);
  },[]);

  useEffect(()=>{ if(userName) localStorage.setItem("khatma_username",userName); },[userName]);

  const ref   = ()=>db().ref("khatmat");
  const fresh = async()=>{ const s=await ref().get(); return norm(s.val())||[makeKhatma(0)]; };
  const write = async arr=>{ setKhatmat([...arr]); await ref().set(arr); };

  const activeK  = khatmat.find(k=>k.id===activeId);
  const stats    = getStats(activeK);
  const cpPct    = activeK?Math.round((stats.cp/30)*100):0;
  const rsPct    = activeK?Math.round((stats.rs/30)*100):0;
  const allDone  = activeK?.juzList.every(j=>j.status==="completed");
  const juzHL    = (activeK?.juzList||[]).map(j=>({...j,hl:!!search.trim()&&!!j.reservedBy?.toLowerCase().includes(search.trim().toLowerCase())}));
  const srchHits = juzHL.filter(j=>j.hl);

  const handleReserve = async()=>{
    const name=userName.trim();
    if(!name){showToast("يرجى إدخال اسمك أولاً ✏️","error");return;}
    const arr=await fresh();
    const ki=arr.findIndex(k=>k.id===activeId); if(ki===-1)return;
    const ji=arr[ki].juzList.findIndex(j=>j.number===selJuz.number);
    if(arr[ki].juzList[ji].status!=="available"){showToast("تم حجز هذا الجزء للتو ⚡","error");setModal(null);return;}
    arr[ki].juzList[ji]={...arr[ki].juzList[ji],status:"reserved",reservedBy:name,reservedAt:new Date().toISOString()};
    const allRes=arr[ki].juzList.every(j=>j.status!=="available");
    if(allRes&&ki===arr.length-1){arr.push(makeKhatma(arr.length));showToast("🎉 اكتمل الحجز! تم فتح ختمة جديدة","gold");}
    else showToast(`✓ تم حجز الجزء ${selJuz.number} باسم ${name}`);
    setModal(null); await write(arr);
  };
  const handleComplete = async()=>{
    const arr=await fresh(); const ki=arr.findIndex(k=>k.id===activeId);
    const ji=arr[ki].juzList.findIndex(j=>j.number===selJuz.number);
    arr[ki].juzList[ji]={...arr[ki].juzList[ji],status:"completed",completedAt:new Date().toISOString()};
    setModal(null); showToast("🌟 بارك الله فيك! تم تسجيل إتمام الجزء","gold"); await write(arr);
  };
  const handleCancel = async()=>{
    const arr=await fresh(); const ki=arr.findIndex(k=>k.id===activeId);
    const ji=arr[ki].juzList.findIndex(j=>j.number===selJuz.number);
    arr[ki].juzList[ji]=makeJuz(selJuz.number-1);
    setModal(null); showToast("تم إلغاء الحجز"); await write(arr);
  };
  const addKhatma = async()=>{
    const arr=await fresh();
    if(arr[arr.length-1]?.juzList.some(j=>j.status==="available")){showToast("لا يمكن فتح ختمة جديدة قبل اكتمال الحجز 🔒","error");return;}
    const nk=makeKhatma(arr.length); arr.push(nk); setActiveId(nk.id);
    showToast("تم إنشاء ختمة جديدة 🌿"); await write(arr);
  };
  const adminReset = async kid=>{
    const arr=await fresh(); const ki=arr.findIndex(k=>k.id===kid);
    arr[ki].juzList=Array.from({length:30},(_,i)=>makeJuz(i));
    showToast("تمت إعادة التعيين"); await write(arr);
  };
  const adminDelete = async kid=>{
    let arr=await fresh(); arr=arr.filter(k=>k.id!==kid);
    if(!arr.length)arr=[makeKhatma(0)];
    setDelConfirm(null); if(activeId===kid)setActiveId(arr[0].id);
    showToast("تم الحذف"); await write(arr);
  };

  if(loading) return (
    <div className="loading">
      <div className="spinner"/>
      <div>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
      <div style={{fontSize:"1rem",color:"var(--txt3)"}}>جاري التحميل...</div>
    </div>
  );

  return (
    <div className="app-wrap" dir="rtl">
      <header className="header">
        <div className="header-geo"/>
        <div className="header-inner">
          <div className="header-basmala">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
          <h1 className="header-title">ختمات القرآن الكريم</h1>
          <p className="header-sub">احجز جزءك وشارك في إتمام كتاب الله</p>
          <div className="header-ornament">❧ ✦ ✦ ✦ ❧</div>
        </div>
        <div className="gold-bar"/>
      </header>

      <div className="tab-bar">
        <div className="tab-inner">
          {khatmat.map(k=>{
            const s=getStats(k);const done=s.cp===30;const full=s.av===0&&!done;
            return <button key={k.id} className={`tab-btn${k.id===activeId?" active":""}${done?" done":""}`} onClick={()=>setActiveId(k.id)}>{done?"✅ ":full?"🔒 ":""}{k.name}</button>;
          })}
          <button className="tab-add" onClick={addKhatma}><span style={{fontSize:"1.1rem",lineHeight:1}}>+</span> ختمة جديدة</button>
          <button className="tab-admin" onClick={()=>setAdminOpen(v=>!v)}>⚙️ الإدارة</button>
        </div>
      </div>

      <main className="main">
        {activeK && (<>
          <div className="khatma-card">
            <div className="khatma-title"><span>📖</span> {activeK.name}</div>
            <div className="khatma-meta">أُنشئت في {fmtDate(activeK.createdAt)}</div>
            {allDone&&<div className="complete-banner"><h3>🌟 تبارك الله — اكتمل ختم القرآن الكريم 🌟</h3><p>جزى الله المشاركين خير الجزاء</p></div>}
            <div className="prog-header">
              <span className="prog-lbl">📊 تقدم الختمة</span>
              <span className="prog-pct">{cpPct}٪ مكتمل</span>
            </div>
            <div className="prog-track">
              <div className="prog-fill-rs" style={{width:`${rsPct+cpPct}%`}}/>
              <div className="prog-fill-cp" style={{width:`${cpPct}%`}}/>
            </div>
            <div className="prog-stats">
              <span className="prog-stat"><span className="dot av"/>متاح: {stats.av}</span>
              <span className="prog-stat"><span className="dot rs"/>محجوز: {stats.rs}</span>
              <span className="prog-stat"><span className="dot cp"/>مكتمل: {stats.cp}</span>
            </div>
          </div>

          <div className="controls">
            <div className="inp-wrap">
              <span className="inp-icon">👤</span>
              <input className="inp" placeholder="أدخل اسمك للحجز..." value={userName} onChange={e=>setUserName(e.target.value)} dir="rtl"/>
            </div>
            <div className="inp-wrap">
              <span className="inp-icon">🔍</span>
              <input className="inp" placeholder="ابحث باسم الشخص..." value={search} onChange={e=>setSearch(e.target.value)} dir="rtl"/>
            </div>
          </div>

          {search.trim()&&(
            <div className="srch-result">
              {srchHits.length
                ? <>{<span>نتائج «<strong>{search}</strong>»:</span>}{srchHits.map(j=><span key={j.number} className="srch-badge">الجزء {j.number}</span>)}</>
                : <span className="srch-none">لم يُعثر على «{search}»</span>}
            </div>
          )}

          <div className="juz-grid">
            {juzHL.map(juz=>(
              <div key={juz.number} className={`juz-card ${juz.status}${juz.hl?" hl":""}`}
                onClick={()=>{setSelJuz(juz);setModal(juz.status==="available"?"reserve":"manage");}}>
                <div className="juz-badge">{AR_NUM[juz.number-1]}</div>
                <div className="juz-num-lbl">الجزء {juz.number}</div>
                {juz.status==="available"&&<div className="juz-status">🟢 متاح</div>}
                {juz.status==="reserved"&&<><div className="juz-by">{juz.reservedBy}</div><div className="juz-status">📌 محجوز</div></>}
                {juz.status==="completed"&&<><div className="juz-by">{juz.reservedBy}</div><div className="juz-status">✅ مكتمل</div></>}
              </div>
            ))}
          </div>
        </>)}

        {adminOpen&&(
          <div className="admin-panel">
            <div className="admin-head">
              <div className="admin-title">⚙️ لوحة الإدارة</div>
              <button className="btn btn-outline btn-sm" onClick={()=>setAdminOpen(false)}>إغلاق ✕</button>
            </div>
            {khatmat.map(k=>{
              const s=getStats(k);const rP=Math.round(((s.rs+s.cp)/30)*100);const cP=Math.round((s.cp/30)*100);
              return(
                <div key={k.id} className="admin-row" style={k.id===activeId?{background:"var(--g6)"}:{}}>
                  <div className="admin-row-head">
                    <div className="admin-row-name">{k.name}</div>
                    <div className="admin-actions">
                      <button className="btn btn-outline btn-sm" onClick={()=>adminReset(k.id)}>🔄 إعادة تعيين</button>
                      {delConfirm===k.id
                        ?<><span style={{fontSize:".82rem",color:"var(--red)"}}>تأكيد؟</span><button className="btn btn-ghost btn-sm" onClick={()=>adminDelete(k.id)}>نعم احذف</button><button className="btn btn-outline btn-sm" onClick={()=>setDelConfirm(null)}>إلغاء</button></>
                        :<button className="btn btn-ghost btn-sm" onClick={()=>setDelConfirm(k.id)}>🗑 حذف</button>}
                    </div>
                  </div>
                  <div className="admin-row-meta">متاح: {s.av} · محجوز: {s.rs} · مكتمل: {s.cp} · الحجز: {rP}%</div>
                  <div className="prog-track" style={{height:"8px"}}>
                    <div className="prog-fill-rs" style={{width:`${rP}%`}}/>
                    <div className="prog-fill-cp" style={{width:`${cP}%`}}/>
                  </div>
                  {k.juzList.some(j=>j.status!=="available")&&(
                    <table className="tbl">
                      <thead><tr><th>الجزء</th><th>الاسم</th><th>الحالة</th><th>التاريخ</th></tr></thead>
                      <tbody>
                        {k.juzList.filter(j=>j.status!=="available").map(j=>(
                          <tr key={j.number}>
                            <td style={{fontFamily:"'Amiri',serif",fontWeight:600}}>الجزء {j.number}</td>
                            <td>{j.reservedBy||"—"}</td>
                            <td><span className={`badge ${j.status==="reserved"?"rs":"cp"}`}>{j.status==="reserved"?"📌 محجوز":"✅ مكتمل"}</span></td>
                            <td style={{fontSize:".77rem",color:"var(--txt3)"}}>{fmtDate(j.reservedAt)||"—"}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                </div>
              );
            })}
          </div>
        )}

        <div className="footer">
          <div className="footer-orn">❧ ✦ ✦ ✦ ❧</div>
          <p>اللهم اجعل القرآن ربيع قلوبنا ونور صدورنا وجلاء أحزاننا وذهاب همومنا</p>
        </div>
      </main>

      {modal==="reserve"&&selJuz&&(
        <div className="overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <span className="modal-ico">📖</span>
            <div className="modal-title">حجز الجزء {selJuz.number}</div>
            <div className="modal-sub">أدخل اسمك الكريم لتثبيت حجزك</div>
            <input className="modal-inp" placeholder="اسمك الكريم..." value={userName}
              onChange={e=>setUserName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleReserve()} autoFocus/>
            <div className="modal-actions">
              <button className="btn btn-primary" onClick={handleReserve} disabled={!userName.trim()}>✓ تأكيد الحجز</button>
              <button className="btn btn-outline" onClick={()=>setModal(null)}>إلغاء</button>
            </div>
          </div>
        </div>
      )}

      {modal==="manage"&&selJuz&&(
        <div className="overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <span className="modal-ico">{selJuz.status==="completed"?"✅":"📌"}</span>
            <div className="modal-title">الجزء {selJuz.number}</div>
            <div className="modal-info">
              <div className="modal-info-lbl">{selJuz.status==="completed"?"أتمّ هذا الجزء":"تم الحجز بواسطة"}</div>
              <div className="modal-info-name">{selJuz.reservedBy}</div>
              {selJuz.reservedAt&&<div className="modal-info-date">بتاريخ {fmtDate(selJuz.reservedAt)}</div>}
            </div>
            <div className="modal-actions">
              {selJuz.status==="reserved"&&<><button className="btn btn-gold" onClick={handleComplete}>✅ تم الانتهاء</button><button className="btn btn-ghost" onClick={handleCancel}>🗑 إلغاء الحجز</button></>}
              {selJuz.status==="completed"&&<button className="btn btn-ghost" onClick={handleCancel}>↩️ إعادة للحجز</button>}
              <button className="btn btn-outline" onClick={()=>setModal(null)}>إغلاق</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<div className={`toast ${toast.type}`}>{toast.msg}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
